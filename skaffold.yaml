apiVersion: skaffold/v4beta3
kind: Config
manifests:
  rawYaml:
  - ./infra/k8s/*
build:
  local:
    push: false
  artifacts:
  - image: faisalmisbah23/auth
    context: .
    docker:
      dockerfile: auth/Dockerfile
    sync:
      manual:
      - src: 'auth/src/**/*.ts'
        dest: .
        strip: 'auth'
  - image: faisalmisbah23/client
    context: client
    docker:
      dockerfile: Dockerfile
    sync:
      manual:
      - dest: .
        src: '**/*.js'
  - image: faisalmisbah23/tickets
    context: .
    docker:
      dockerfile: tickets/Dockerfile
    sync:
      manual:
      - src: 'tickets/src/**/*.ts'
        dest: .
        strip: 'tickets'
  - image: faisalmisbah23/orders
    context: .
    docker:
      dockerfile: orders/Dockerfile
    sync:
      manual:
      - src: 'orders/src/**/*.ts'
        dest: .
        strip: 'orders'
  - image: faisalmisbah23/expiration
    context: .
    docker:
      dockerfile: expiration/Dockerfile
    sync:
      manual:
      - src: 'expiration/src/**/*.ts'
        dest: .
        strip: 'expiration'
